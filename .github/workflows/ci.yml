name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://api.ideafactorylab.org/stats)
          echo "API status: $STATUS"
          test "$STATUS" = "200"
      - name: Check Discovery Files
        run: |
          curl -sf https://api.ideafactorylab.org/.well-known/mcp.json > /dev/null
          curl -sf https://api.ideafactorylab.org/.well-known/x402.json > /dev/null
          curl -sf https://api.ideafactorylab.org/llms.txt > /dev/null
          echo "All discovery files OK"
